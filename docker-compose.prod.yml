version: "3.9"
services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      DATABASE_URL: postgresql://aureline:${POSTGRES_PASSWORD}@db:5432/aureline
    command: /bin/sh -c "flask db upgrade && gunicorn -b 0.0.0.0:5000 run:app"
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:5000:5000"

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: aureline
      POSTGRES_USER: aureline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

volumes:
  postgres_data:
